<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathfindr — Your Result</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg1: #FFF5D6;
  --bg2: #F6D68A;
  --bg3: #E0A93B;
  --ink: #3A1F00;
  --soft: #7A4B1F;
  --accent: #D4A030;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Crimson Pro', serif;
  background: radial-gradient(circle at top, var(--bg1), var(--bg2), var(--bg3));
  min-height:100vh;
  color:var(--ink);
}

/* NAV */
.nav {
  padding:16px 22px;
  display:flex;
  justify-content:space-between;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
}

.logo {
  font-family:'Playfair Display', serif;
  font-size:1.4rem;
}

.logo span { color:var(--soft); }

/* PAGE */
.container {
  max-width:800px;
  margin:auto;
  padding:30px 20px 60px;
}

/* TITLE */
.title {
  font-family:'Playfair Display', serif;
  font-size:2rem;
  margin-bottom:10px;
}

.subtitle {
  font-style:italic;
  color:var(--soft);
  margin-bottom:30px;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.5);
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
  border:1px solid rgba(180,120,30,0.2);
  backdrop-filter:blur(8px);
}

/* TOP STREAM */
.top-stream {
  text-align:center;
}

.stream-name {
  font-family:'Playfair Display', serif;
  font-size:1.8rem;
  margin-top:10px;
}

/* PATHS */
.paths {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}

.paths h4 {
  font-size:0.9rem;
  margin-bottom:6px;
}

.paths ul {
  font-size:0.85rem;
  line-height:1.5;
  padding-left:15px;
}

/* WHY */
.why {
  font-size:0.95rem;
  line-height:1.6;
}

/* FINAL MESSAGE */
.final {
  text-align:center;
  font-style:italic;
  line-height:1.8;
  font-size:1rem;
}

.highlight {
  font-weight:bold;
  font-size:1.2rem;
}

/* ANIMATION */
.fade {
  opacity:0;
  transform:translateY(20px);
  transition:all 0.6s ease;
}

.fade.show {
  opacity:1;
  transform:translateY(0);
}

</style>
</head>

<body>

<div class="nav">
  <div class="logo">Path<span>findr</span></div>
  <div>Final Result</div>
</div>

<div class="container">

  <h1 class="title">Your Path Awaits</h1>
  <p class="subtitle">A personalized direction crafted just for you.</p>

  <!-- TOP STREAM -->
  <div class="card top-stream fade" id="topCard">
    <div>🎯 Recommended Stream</div>
    <div class="stream-name" id="streamName"></div>
  </div>

  <!-- ALTERNATE PATHS -->
  <div class="card fade" id="pathsCard">
    <h3>🔄 Explore Multiple Paths</h3>
    <div class="paths">

      <div>
        <h4>🔬 Science</h4>
        <ul id="science-paths"></ul>
      </div>

      <div>
        <h4>📈 Commerce</h4>
        <ul id="commerce-paths"></ul>
      </div>

      <div>
        <h4>🎨 Arts</h4>
        <ul id="arts-paths"></ul>
      </div>

    </div>
  </div>

  <!-- WHY YOU -->
  <div class="card why fade" id="whyCard">
    <h3>💡 Why This Fits You</h3>
    <p id="whyText"></p>
  </div>

  <!-- FINAL MESSAGE -->
  <div class="card final fade" id="finalCard">
    <p id="finalMessage"></p>
  </div>

</div>

<script>

/* GET DATA */
const name = localStorage.getItem('studentName') || "Explorer";
const topStream = localStorage.getItem('topStream');

/* FORMAT */
function formatStream(s) {
  return s.charAt(0).toUpperCase() + s.slice(1);
}

/* SET STREAM */
document.getElementById('streamName').textContent =
  formatStream(topStream);

/* PATH DATA */
const paths = {
  science: [
    "JEE → Engineering",
    "NEET → Medical",
    "Research / Pure Science",
    "AI & Data Science"
  ],
  commerce: [
    "CA / Finance",
    "Company Secretary (CS)",
    "Business & Startups",
    "CS Fundamentals (Coding)"
  ],
  arts: [
    "UPSC / Govt Exams",
    "Psychology",
    "Design / Media",
    "Law"
  ]
};

/* RENDER PATHS */
['science','commerce','arts'].forEach(stream => {
  const ul = document.getElementById(stream + '-paths');
  paths[stream].forEach(p => {
    const li = document.createElement('li');
    li.textContent = p;
    ul.appendChild(li);
  });
});

/* WHY TEXT (SMART DEFAULT) */
document.getElementById('whyText').textContent =
`Based on your academic performance, you show strong alignment with the ${formatStream(topStream)} stream.
Your aptitude and personality responses indicate natural strengths in areas that thrive in this field.
Your interaction with Pathfindr also reflected curiosity and clarity towards this direction.`;

/* FINAL MESSAGE */
document.getElementById('finalMessage').innerHTML = `
My strong suggestion, based on your personality, aptitude test, academic performance, and your conversation with Pathfindr, is that you are best suited for the <span class="highlight">${formatStream(topStream)}</span> stream.

<br/><br/>

However, this is not a limitation — you have the potential to explore multiple paths across different fields.

<br/><br/>

In the end, the choice is yours.

<br/><br/>

<span class="highlight">"TRUST YOUR GUT."</span>
`;

/* ANIMATION SEQUENCE */
const cards = ['topCard','pathsCard','whyCard','finalCard'];

cards.forEach((id, i) => {
  setTimeout(() => {
    document.getElementById(id).classList.add('show');
  }, i * 400);
});

</script>

</body>
</html>
