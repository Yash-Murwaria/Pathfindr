<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathfindr — Your Interests</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

<style>
:root {
  --fire: #FF6B00;
  --amber: #FF9A00;
  --gold: #FFB830;
  --cream: #FFF8EE;
  --dark: #1A0E00;
  --bg: radial-gradient(circle at top, #2C1A00, #1A0E00);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--cream);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-x: hidden;
}

/* MAIN CARD */
.container {
  width: 100%;
  max-width: 500px;
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(15px);
  padding: 40px;
  border-radius: 30px;
  border: 1px solid rgba(255, 184, 48, 0.15);
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  text-align: center;
  animation: fadeIn 0.8s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* TITLE */
h1 {
  font-family: 'Syne', sans-serif;
  font-size: 2.2rem;
  font-weight: 800;
  margin-bottom: 10px;
  background: linear-gradient(135deg, var(--fire), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  font-size: 1rem;
  color: rgba(255, 248, 238, 0.6);
  margin-bottom: 35px;
}

/* SEARCH BAR */
.search-box {
  position: relative;
  margin-bottom: 30px;
}

.search-box i {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--amber);
  opacity: 0.6;
}

.input {
  width: 100%;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 184, 48, 0.2);
  border-radius: 15px;
  padding: 15px 15px 15px 45px;
  color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  outline: none;
  transition: all 0.3s ease;
}

.input:focus {
  background: rgba(255, 255, 255, 0.08);
  border-color: var(--amber);
  box-shadow: 0 0 15px rgba(255, 154, 0, 0.2);
}

/* OPTIONS GRID (CHIPS) */
.options-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  max-height: 300px;
  overflow-y: auto;
  padding: 5px;
  margin-bottom: 35px;
  scrollbar-width: thin;
  scrollbar-color: var(--amber) transparent;
}

.options-grid::-webkit-scrollbar {
  width: 6px;
}
.options-grid::-webkit-scrollbar-thumb {
  background: var(--amber);
  border-radius: 10px;
}

.option {
  padding: 10px 20px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 184, 48, 0.1);
  border-radius: 50px;
  font-size: 0.9rem;
  font-weight: 500;
  color: rgba(255, 248, 238, 0.8);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  user-select: none;
}

.option:hover {
  background: rgba(255, 184, 48, 0.1);
  border-color: var(--amber);
  transform: translateY(-2px);
}

.option.selected {
  background: linear-gradient(135deg, var(--fire), var(--amber));
  color: white;
  border-color: transparent;
  box-shadow: 0 10px 20px rgba(255, 107, 0, 0.3);
}

/* COUNTER */
.counter {
  font-size: 0.85rem;
  color: var(--gold);
  margin-bottom: 20px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* NEXT BUTTON */
.btn {
  width: 100%;
  padding: 16px;
  border-radius: 18px;
  border: none;
  background: linear-gradient(135deg, var(--fire), var(--amber));
  color: white;
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.4s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  box-shadow: 0 15px 30px rgba(255, 107, 0, 0.2);
}

.btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.btn:not(:disabled):hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 20px 40px rgba(255, 107, 0, 0.4);
}

.btn:not(:disabled):active {
  transform: translateY(-1px);
}

/* SKIP LINK */
.skip-container {
  margin-top: 25px;
}

.skip {
  font-size: 0.9rem;
  color: rgba(255, 248, 238, 0.4);
  text-decoration: none;
  transition: all 0.3s ease;
  border-bottom: 1px solid transparent;
}

.skip:hover {
  color: var(--gold);
  border-bottom: 1px solid var(--gold);
}

/* RESPONSIVE */
@media (max-width: 480px) {
  .container {
    padding: 30px 20px;
  }
  h1 { font-size: 1.8rem; }
}
</style>
</head>

<body>

<div class="container">
  <h1>Your Interests</h1>
  <p class="subtitle">Tell us what fuels your curiosity ✨</p>

  <div class="search-box">
    <i class="fas fa-search"></i>
    <input 
      type="text" 
      placeholder="Search interests..." 
      class="input" 
      id="searchInput"
      autocomplete="off"
    />
  </div>

  <div class="counter" id="selectionCounter">0 Interests Selected</div>

  <div class="options-grid" id="optionsList">
    <!-- Interests will be injected here -->
  </div>

  <button class="btn" id="nextBtn" disabled>
    Talk to Pathfindr AI 🤖 <i class="fas fa-arrow-right"></i>
  </button>

  <div class="skip-container">
    <a href="chat.html" class="skip" onclick="skipSelection()">Skip for now</a>
  </div>
</div>

<script>
const interests = [
  { id: 'coding', label: 'Coding' },
  { id: 'design', label: 'Design' },
  { id: 'ai', label: 'Artificial Intelligence' },
  { id: 'math', label: 'Mathematics' },
  { id: 'science', label: 'Science' },
  { id: 'business', label: 'Entrepreneurship' },
  { id: 'writing', label: 'Writing' },
  { id: 'gaming', label: 'Gaming' },
  { id: 'music', label: 'Music' },
  { id: 'sports', label: 'Sports' },
  { id: 'psychology', label: 'Psychology' },
  { id: 'astronomy', label: 'Astronomy' },
  { id: 'photography', label: 'Photography' },
  { id: 'finance', label: 'Finance' },
  { id: 'marketing', label: 'Marketing' },
  { id: 'robotics', label: 'Robotics' },
  { id: 'debating', label: 'Debating' },
  { id: 'teaching', label: 'Teaching' },
  { id: 'law', label: 'Law' },
  { id: 'social_work', label: 'Social Work' },
  { id: 'history', label: 'History' },
  { id: 'literature', label: 'Literature' },
  { id: 'economics', label: 'Economics' },
  { id: 'public_speaking', label: 'Public Speaking' }
];

// Sort alphabetically
interests.sort((a, b) => a.label.localeCompare(b.label));

let selected = new Set();

const list = document.getElementById('optionsList');
const input = document.getElementById('searchInput');
const btn = document.getElementById('nextBtn');
const counter = document.getElementById('selectionCounter');

/* RENDER */
function render(filter = ''){
  const filtered = interests.filter(i => 
    i.label.toLowerCase().includes(filter.toLowerCase())
  );

  list.innerHTML = filtered.map(item => `
    <div class="option ${selected.has(item.id) ? 'selected' : ''}" 
         data-id="${item.id}">
      ${item.label}
    </div>
  `).join('');
  
  updateUI();
}

/* UPDATE UI ELEMENTS */
function updateUI() {
  const count = selected.size;
  counter.innerText = `${count} Interest${count !== 1 ? 's' : ''} Selected`;
  
  if(count > 0){
    btn.disabled = false;
  } else {
    btn.disabled = true;
  }
}

/* CLICK HANDLING (EVENT DELEGATION) */
list.addEventListener('click', (e)=>{
  const option = e.target.closest('.option');
  if(!option) return;

  const id = option.dataset.id;

  if(selected.has(id)) {
    selected.delete(id);
    option.classList.remove('selected');
  } else {
    selected.add(id);
    option.classList.add('selected');
  }

  updateUI();
});

/* SEARCH */
input.addEventListener('input', () => render(input.value));

/* NAVIGATION */
btn.onclick = ()=>{
  if(selected.size === 0) return;
  
  // Convert IDs back to labels for the AI context
  const selectedLabels = interests
    .filter(i => selected.has(i.id))
    .map(i => i.label);
    
  localStorage.setItem("interests", JSON.stringify(selectedLabels));
  window.location.href = "chat.html";
};

function skipSelection() {
  localStorage.setItem("interests", JSON.stringify(["None provided"]));
  window.location.href = "chat.html";
}

/* INIT */
render();
</script>

</body>
</html>
