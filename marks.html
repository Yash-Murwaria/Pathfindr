<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- This makes the site look correct on mobile phones -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathfindr - Marks Entry</title>
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <!-- Link to our shared stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container doodle-boundary">
    <!-- Extra Doodle Elements for all corners -->
    <div class="doodle-item top-left"><i class="fas fa-pencil-alt"></i></div>
    <div class="doodle-item top-right"><i class="fas fa-lightbulb"></i></div>
    <div class="doodle-item bottom-left"><i class="fas fa-graduation-cap"></i></div>
    <div class="doodle-item bottom-right"><i class="fas fa-rocket"></i></div>
    <div class="doodle-item mid-left"><i class="fas fa-star"></i></div>
    <div class="doodle-item mid-right"><i class="fas fa-heart"></i></div>

    <!-- More internal doodles -->
    <div class="internal-doodle d1"><i class="fas fa-atom"></i></div>
    <div class="internal-doodle d2"><i class="fas fa-shapes"></i></div>
    <div class="internal-doodle d3"><i class="fas fa-palette"></i></div>
    <div class="internal-doodle d4"><i class="fas fa-microscope"></i></div>

    <h1>enter your data</h1>
    <p class="center-text">make the future Brighter, Shiner, Secure</p>
    
    <form id="marksForm" class="marks-showcase">
      <div class="subject-card">
        <div class="icon-circle"><i class="fas fa-book"></i></div>
        <div class="subject-info">
          <label for="english">English</label>
          <input type="number" id="english" min="0" max="100" required placeholder="00">
        </div>
      </div>
      
      <div class="subject-card">
        <div class="icon-circle"><i class="fas fa-language"></i></div>
        <div class="subject-info">
          <label for="hindi">Hindi</label>
          <input type="number" id="hindi" min="0" max="100" required placeholder="00">
        </div>
      </div>
      
      <div class="subject-card">
        <div class="icon-circle"><i class="fas fa-calculator"></i></div>
        <div class="subject-info">
          <label for="maths">Maths</label>
          <input type="number" id="maths" min="0" max="100" required placeholder="00">
        </div>
      </div>
      
      <div class="subject-card">
        <div class="icon-circle"><i class="fas fa-flask"></i></div>
        <div class="subject-info">
          <label for="science">Science</label>
          <input type="number" id="science" min="0" max="100" required placeholder="00">
        </div>
      </div>
      
      <div class="subject-card">
        <div class="icon-circle"><i class="fas fa-globe-asia"></i></div>
        <div class="subject-info">
          <label for="social">Social Science</label>
          <input type="number" id="social" min="0" max="100" required placeholder="00">
        </div>
      </div>
      
      <div class="subject-card">
        <div class="icon-circle"><i class="fas fa-desktop"></i></div>
        <div class="subject-info">
          <label for="computer">Computer</label>
          <input type="number" id="computer" min="0" max="100" required placeholder="00">
        </div>
      </div>
      
      <button type="submit" class="btn-save">Save & Continue <i class="fas fa-arrow-right"></i></button>
    </form>
  </div>

  <!-- Link to our shared JavaScript file -->
  <script src="app.js"></script>
</body>
</html>
