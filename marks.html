<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pathfindr - Marks Entry</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#FFF5D6,#F6D68A,#E0A93B);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  background:white;
  padding:30px;
  border-radius:20px;
  width:400px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1 {
  text-align:center;
  color:#FF8C00;
}

.center-text {
  text-align:center;
  font-size:0.9rem;
  margin-bottom:20px;
  color:#555;
}

.subject-card {
  display:flex;
  align-items:center;
  margin-bottom:15px;
}

.icon-circle {
  width:40px;
  height:40px;
  background:#FF8C00;
  color:white;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-right:10px;
}

.subject-info {
  flex:1;
}

input {
  width:100%;
  padding:8px;
  border:none;
  border-bottom:2px solid #FF8C00;
  outline:none;
}

/* BUTTON */
.btn {
  width:100%;
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:25px;
  background:linear-gradient(135deg,#FF8C00,#FFA500);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.btn:hover {
  opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

<h1>Enter Your Data</h1>
<p class="center-text">Make your future brighter ✨</p>

<form id="marksForm">

<div class="subject-card">
<div class="icon-circle"><i class="fas fa-book"></i></div>
<div class="subject-info">
<label>English</label>
<input type="number" id="english" required min="0" max="100">
</div>
</div>

<div class="subject-card">
<div class="icon-circle"><i class="fas fa-language"></i></div>
<div class="subject-info">
<label>Hindi</label>
<input type="number" id="hindi" required min="0" max="100">
</div>
</div>

<div class="subject-card">
<div class="icon-circle"><i class="fas fa-calculator"></i></div>
<div class="subject-info">
<label>Maths</label>
<input type="number" id="maths" required min="0" max="100">
</div>
</div>

<div class="subject-card">
<div class="icon-circle"><i class="fas fa-flask"></i></div>
<div class="subject-info">
<label>Science</label>
<input type="number" id="science" required min="0" max="100">
</div>
</div>

<div class="subject-card">
<div class="icon-circle"><i class="fas fa-globe"></i></div>
<div class="subject-info">
<label>Social Science</label>
<input type="number" id="social" required min="0" max="100">
</div>
</div>

<div class="subject-card">
<div class="icon-circle"><i class="fas fa-desktop"></i></div>
<div class="subject-info">
<label>Computer</label>
<input type="number" id="computer" required min="0" max="100">
</div>
</div>

<!-- 🎯 ONLY BUTTON LEFT -->
<button type="button" class="btn" onclick="goToInterest()">
  Select Interest 🎯
</button>

</form>
</div>

<script>

// 🎯 Redirect to interest page
function goToInterest(){
  window.location.href = "interest.html";
}

</script>

</body>
</html>
