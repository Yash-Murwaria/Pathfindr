<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>

  <nav class="nav">
    <div class="nav-logo">Path<span>findr</span></div>
    <div class="nav-sub">India · Class X Career Atlas</div>
  </nav>

  <div class="page">

    <div class="atlas-header">
      <h1>Career Atlas</h1>
      <div class="ornament">
        <div class="ornament-line"></div>
        <div class="ornament-diamond"></div>
        <div class="ornament-line r"></div>
      </div>
      <p>Click a stream to explore your paths</p>
    </div>

    <div class="flowchart">

      <!-- ROOT NODE -->
      <div class="root-node">
        <h2>After Class X</h2>
        <p>Choose your stream</p>
      </div>

      <!-- stem down from root -->
      <div class="connector"></div>

      <!-- horizontal T-bar fanning to 3 streams -->
      <div class="connector-fan"></div>

      <!-- three short vertical drops from the T-bar -->
      <div class="stream-drops">
        <div class="stream-drop"><div class="stream-drop-line"></div></div>
        <div class="stream-drop"><div class="stream-drop-line"></div></div>
        <div class="stream-drop"><div class="stream-drop-line"></div></div>
      </div>

      <!-- THE THREE STREAM NODES -->
      <div class="stream-row">

        <div class="stream-node science" id="btn-science" onclick="toggleStream('science')">
          <span class="stream-emoji">🔬</span>
          <h3>Science</h3>
          <p>PCM / PCB</p>
          <svg class="stream-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>

        <div class="stream-node arts" id="btn-arts" onclick="toggleStream('arts')">
          <span class="stream-emoji">🎨</span>
          <h3>Arts</h3>
          <p>Humanities</p>
          <svg class="stream-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>

        <div class="stream-node commerce" id="btn-commerce" onclick="toggleStream('commerce')">
          <span class="stream-emoji">📈</span>
          <h3>Commerce</h3>
          <p>Business</p>
          <svg class="stream-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>

      </div>

      <!-- CAREER PANELS (one per stream, hidden until stream is clicked) -->
      <div class="careers-panel" id="panel-science">
        <div class="careers-inner">
          <div class="careers-grid" id="grid-science"></div>
        </div>
      </div>

      <div class="careers-panel" id="panel-arts">
        <div class="careers-inner">
          <div class="careers-grid" id="grid-arts"></div>
        </div>
      </div>

      <div class="careers-panel" id="panel-commerce">
        <div class="careers-inner">
          <div class="careers-grid" id="grid-commerce"></div>
        </div>
      </div>

    </div><!-- .flowchart -->

    <div class="scroll-hint">
      Tap any career card to learn more
      <span>↓</span>
    </div>

  </div><!-- .page -->

  <button class="continue-btn" onclick="window.location.href='marks.html'">
    Enter My Marks →
  </button>

  <!-- DETAIL MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal" id="modal">
      <div class="modal-handle"></div>
      <div class="modal-title"  id="modalTitle"></div>
      <div class="modal-badge"  id="modalBadge"></div>
      <div class="modal-section">Entrance Exams</div>
      <div class="chips"        id="modalExams"></div>
      <div class="modal-section">Top Colleges</div>
      <div class="chips"        id="modalColleges"></div>
      <div class="modal-section">Expected Salary</div>
      <div class="modal-salary" id="modalSalary"></div>
      <div class="modal-suited" id="modalSuited"></div>
      <button class="modal-close" onclick="closeModal()">Close  ✕</button>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════
    // CAREER DATA  — 18 careers across 3 streams
    // ═══════════════════════════════════════════════════

    const streams = {
      science: {
        careers: [
          {
            id:'engineering', emoji:'⚙️', title:'Engineering',
            salary:'₹6L – ₹25L / yr', hint:'JEE · 4 yr B.Tech',
            exams:['JEE Main','JEE Advanced','BITSAT','MHT-CET'],
            colleges:['IIT Bombay','NIT Trichy','BITS Pilani','VIT Vellore'],
            suited:'Best if you scored high in Math & Physics. Logical thinkers who enjoy building and problem-solving thrive here.'
          },
          {
            id:'medicine', emoji:'🩺', title:'Medicine (MBBS)',
            salary:'₹8L – ₹30L / yr', hint:'NEET · 5.5 yr MBBS',
            exams:['NEET UG'],
            colleges:['AIIMS Delhi','CMC Vellore','JIPMER','KMC Manipal'],
            suited:'Best if Biology is your strongest subject. Requires patience — 5.5 years MBBS plus internship — but immensely rewarding.'
          },
          {
            id:'datascience', emoji:'📊', title:'Data Science / AI',
            salary:'₹8L – ₹40L / yr', hint:'JEE / CUET · 4 yr',
            exams:['JEE Main','CUET','University Entrances'],
            colleges:['IIT Madras','IISc Bangalore','IIIT Hyderabad','DTU Delhi'],
            suited:"Perfect if you enjoy Math and spotting patterns. One of India's fastest-growing fields with strong global demand."
          },
          {
            id:'architecture', emoji:'🏛️', title:'Architecture',
            salary:'₹4L – ₹18L / yr', hint:'NATA · 5 yr B.Arch',
            exams:['NATA','JEE Paper 2 (B.Arch)'],
            colleges:['SPA Delhi','CEPT Ahmedabad','IIT Roorkee','RV College Bangalore'],
            suited:'Best for students who are both creative and technical. Strong drawing skills combined with solid Math are essential.'
          },
          {
            id:'research', emoji:'🧪', title:'Pure Science / Research',
            salary:'₹5L – ₹20L / yr', hint:'IISER / IISc · PhD path',
            exams:['KVPY','CUET','IISc Entrance','IISER Aptitude Test'],
            colleges:['IISc Bangalore','IISER Pune','TIFR Mumbai','JNU Delhi'],
            suited:'For deeply curious students who want to understand how the universe works. Long academic path but genuinely fulfilling.'
          },
          {
            id:'pharmacy', emoji:'💊', title:'Pharmacy',
            salary:'₹3.5L – ₹12L / yr', hint:'State CET · 4 yr B.Pharm',
            exams:['NEET (some states)','GPAT (M.Pharm)','State CETs'],
            colleges:['Manipal College of Pharmacy','JSS College Mysore','ICT Mumbai'],
            suited:'Good if Biology & Chemistry are strong but you want a shorter path than MBBS. Solid demand in hospitals and pharma companies.'
          }
        ]
      },
      arts: {
        careers: [
          {
            id:'law', emoji:'⚖️', title:'Law (LLB)',
            salary:'₹5L – ₹25L / yr', hint:'CLAT · 5 yr BA LLB',
            exams:['CLAT','AILET','LSAT India'],
            colleges:['NLSIU Bangalore','NALSAR Hyderabad','NLU Delhi','Symbiosis Law'],
            suited:'Arts students make exceptional lawyers. Strong reading, writing, and debate skills give you a natural courtroom advantage.'
          },
          {
            id:'journalism', emoji:'📰', title:'Journalism & Media',
            salary:'₹3.5L – ₹15L / yr', hint:'IIMC / CUET · 3 yr',
            exams:['IIMC Entrance','ACJ Entrance','XIC Entrance','CUET'],
            colleges:['IIMC Delhi','ACJ Chennai','Symbiosis Pune',"Xavier's Mumbai"],
            suited:'Perfect for curious, communicative students who want to tell stories that matter. Digital media is rapidly expanding this field.'
          },
          {
            id:'design', emoji:'✏️', title:'Design',
            salary:'₹4L – ₹20L / yr', hint:'NID / NIFT · 4 yr',
            exams:['NID Entrance','NIFT Entrance','UCEED','CEED'],
            colleges:['NID Ahmedabad','NIFT Delhi','MIT Institute of Design','Pearl Academy'],
            suited:'Best for visually creative students. Portfolio matters more than exam scores here — start building one early.'
          },
          {
            id:'psychology', emoji:'🧠', title:'Psychology',
            salary:'₹4L – ₹15L / yr', hint:'CUET · 3 yr BA',
            exams:['CUET','DU Entrance','Christ University Entrance'],
            colleges:['NIMHANS Bangalore','Delhi University','Christ University','TISS Mumbai'],
            suited:"Best for empathetic, observant students. India's mental health sector is growing fast with strong demand expected over the next decade."
          },
          {
            id:'upsc', emoji:'🏅', title:'Civil Services (IAS / IPS)',
            salary:'₹7L – ₹25L + perks', hint:'UPSC CSE · graduation first',
            exams:['UPSC CSE Prelims','UPSC CSE Mains','UPSC Interview'],
            colleges:['LBSNAA (training)','Any strong graduation + self-study'],
            suited:"For disciplined, service-minded students with broad knowledge. India's most competitive exam — demands long-term commitment."
          },
          {
            id:'teaching', emoji:'👩‍🏫', title:'Teaching & Education',
            salary:'₹3.5L – ₹12L / yr', hint:'CTET / BEd · 4 yr',
            exams:['CTET','State TET','BEd Entrance','CUET'],
            colleges:['RIE (Regional Institutes)','Jamia Millia Delhi','BHU Varanasi'],
            suited:'Ideal for patient, communicative students who love explaining things clearly. EdTech startups are creating exciting new paths beyond classrooms.'
          }
        ]
      },
      commerce: {
        careers: [
          {
            id:'ca', emoji:'📋', title:'Chartered Accountancy',
            salary:'₹7L – ₹30L / yr', hint:'ICAI · 3–5 yr CA',
            exams:['CA Foundation','CA Intermediate','CA Final (ICAI)'],
            colleges:['ICAI (nationwide)','SRCC Delhi',"St. Xavier's Mumbai"],
            suited:"Best for detail-oriented students strong in Accounts & Math. One of India's most respected professional qualifications."
          },
          {
            id:'mba', emoji:'💼', title:'MBA / Business',
            salary:'₹8L – ₹35L / yr', hint:'CAT · BBA then MBA',
            exams:['CAT','XAT','SNAP','MAT'],
            colleges:['IIM Ahmedabad','XLRI Jamshedpur','FMS Delhi','SP Jain Mumbai'],
            suited:'Best for natural leaders who enjoy strategy. You do BBA first, then MBA — opens doors across virtually every industry.'
          },
          {
            id:'banking', emoji:'🏦', title:'Banking & Finance',
            salary:'₹5L – ₹20L / yr', hint:'IBPS / SBI PO',
            exams:['IBPS PO','SBI PO','RBI Grade B','SEBI Grade A'],
            colleges:['NIBM Pune','IIBF Mumbai','BCom + professional exam'],
            suited:'Excellent for students who want stable, respected careers with structured growth and strong job security.'
          },
          {
            id:'economics', emoji:'📉', title:'Economics',
            salary:'₹5L – ₹22L / yr', hint:'CUET / DSE · 3 yr BA',
            exams:['CUET','DU Entrance','JNU Entrance','DSE Entrance'],
            colleges:['SRCC Delhi','LSR Delhi','Presidency Kolkata','Madras Christian College'],
            suited:'Best for analytical thinkers who enjoy understanding how markets, money, and governments shape everyday life.'
          },
          {
            id:'marketing', emoji:'📱', title:'Digital Marketing',
            salary:'₹4L – ₹18L / yr', hint:'BBA / MICA · 3 yr',
            exams:['CUET','University Entrances','BBA Entrances'],
            colleges:['MICA Ahmedabad','Symbiosis Pune','Christ University Bangalore'],
            suited:'Great for creative plus business-minded students. Fast-growing field with strong remote work and freelance opportunities.'
          },
          {
            id:'lawcom', emoji:'⚖️', title:'Corporate Law',
            salary:'₹5L – ₹25L / yr', hint:'CLAT · 5 yr BA LLB',
            exams:['CLAT','AILET','LSAT India'],
            colleges:['NLSIU Bangalore','NALSAR Hyderabad','NLU Delhi','Symbiosis Law'],
            suited:'Commerce students make excellent corporate lawyers. Your business understanding gives a natural edge in corporate and tax law.'
          }
        ]
      }
    };

    // ═══════════════════════════════════════════════════
    // BUILD CAREER GRIDS — runs once on page load
    // Iterates through each stream and creates card HTML
    // ═══════════════════════════════════════════════════

    Object.keys(streams).forEach(streamKey => {
      const grid = document.getElementById('grid-' + streamKey);
      streams[streamKey].careers.forEach(career => {
        const card = document.createElement('div');
        card.className = `career-card ${streamKey}`;
        card.innerHTML = `
          <span class="career-emoji">${career.emoji}</span>
          <h4>${career.title}</h4>
          <div class="career-salary">${career.salary}</div>
          <div class="career-hint">${career.hint}</div>
        `;
        card.addEventListener('click', () => openModal(career, streamKey));
        grid.appendChild(card);
      });
    });

    // ═══════════════════════════════════════════════════
    // STREAM TOGGLE
    // Only one stream open at a time — clicking a second
    // stream closes the first before opening the new one.
    // ═══════════════════════════════════════════════════

    let activeStream = null;

    function toggleStream(name) {
      if (activeStream === name) {
        closeStream(name);
        activeStream = null;
      } else {
        if (activeStream) closeStream(activeStream);
        openStream(name);
        activeStream = name;
      }
    }

    function openStream(name) {
      const btn   = document.getElementById('btn-' + name);
      const panel = document.getElementById('panel-' + name);
      const cards = panel.querySelectorAll('.career-card');

      btn.classList.add('open');
      panel.classList.add('open');

      // Stagger each card's reveal so they appear one-by-one
      cards.forEach((card, i) => {
        card.classList.remove('revealed');
        setTimeout(() => card.classList.add('revealed'), 80 + i * 60);
      });

      // Scroll the panel into view after the animation starts
      setTimeout(() => {
        panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 120);
    }

    function closeStream(name) {
      const btn   = document.getElementById('btn-' + name);
      const panel = document.getElementById('panel-' + name);
      btn.classList.remove('open');
      panel.classList.remove('open');
      panel.querySelectorAll('.career-card').forEach(c => c.classList.remove('revealed'));
    }

    // ═══════════════════════════════════════════════════
    // MODAL — opens when a career card is clicked
    // ═══════════════════════════════════════════════════

    function openModal(career, streamKey) {
      document.getElementById('modalTitle').textContent  = career.title;
      document.getElementById('modalBadge').textContent  =
        streamKey.charAt(0).toUpperCase() + streamKey.slice(1) + ' Stream';
      document.getElementById('modalSalary').textContent = career.salary;
      document.getElementById('modalSuited').textContent = career.suited;

      ['modalExams', 'modalColleges'].forEach(elId => {
        const el    = document.getElementById(elId);
        el.innerHTML = '';
        const items = elId === 'modalExams' ? career.exams : career.colleges;
        items.forEach(item => {
          const chip = document.createElement('div');
          chip.className   = 'chip';
          chip.textContent = item;
          el.appendChild(chip);
        });
      });

      document.getElementById('modalOverlay').classList.add('active');
      document.body.style.overflow = 'hidden'; // prevent scroll behind modal
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    // Close modal if user clicks the dark overlay (outside the card)
    function handleOverlayClick(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    // Also close on Escape key
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });
  </script>

</body>
</html>
