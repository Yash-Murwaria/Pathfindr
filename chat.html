<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathfindr AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(#FFF5D6,#F6D68A);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CHAT BOX */
.chat {
  width:400px;
  height:600px;
  background:white;
  border-radius:20px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.header {
  background:#FF8C00;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.messages {
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg {
  margin:5px;
  padding:8px;
  border-radius:10px;
  max-width:70%;
  white-space:pre-wrap;
}

.user {
  background:#FF8C00;
  color:white;
  margin-left:auto;
}

.ai {
  background:#eee;
}

.input {
  display:flex;
}

input {
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}

button {
  background:#FF8C00;
  color:white;
  border:none;
  padding:10px;
  cursor:pointer;
}

/* 🎯 OUTSIDE BUTTON */
.quiz-btn {
  margin-top:15px;
  width:200px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- ✅ CHAT -->
<div class="chat">
  <div class="header">Pathfindr AI 🤖</div>

  <div id="messages" class="messages"></div>

  <div class="input">
    <input id="input" placeholder="Ask anything..." onkeypress="handleKey(event)">
    <button onclick="send()">Send</button>
  </div>
</div>

<!-- ✅ BUTTON OUTSIDE -->
<button class="quiz-btn" onclick="goToQuiz()">
  Take Quiz 🎯
</button>

<script>

const messages = document.getElementById("messages");

// 📊 Stored data
const marks = localStorage.getItem("marks") || "Not provided";
const scores = localStorage.getItem("scores") || "Not provided";
const stream = localStorage.getItem("topStream") || "Not decided";

const context = `
Marks: ${marks}
Scores: ${scores}
Stream: ${stream}
`;

// 👋 Welcome
addMsg("Hey! I'm Pathfindr AI 🤖\nAsk me anything about your career, streams, or confusion — I'm here for you.", "ai");

// ➕ Add message
function addMsg(text, type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

// 🚀 Send message
async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  addMsg(text,"user");
  input.value = "";

  const loading = document.createElement("div");
  loading.className = "msg ai";
  loading.innerText = "Thinking...";
  messages.appendChild(loading);

  try {
    const res = await fetch("http://127.0.0.1:3000/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        message:text,
        context:context
      })
    });

    const data = await res.json();

    messages.removeChild(loading);
    addMsg(data.reply,"ai");

  } catch(err){
    messages.removeChild(loading);
    addMsg("Connection error ❌ Check server", "ai");
  }
}

// ⌨️ Enter key
function handleKey(e){
  if(e.key==="Enter") send();
}

// 🎯 Navigate
function goToQuiz(){
  window.location.href = "quiz.html";
}

</script>

</body>
</html>
