<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathfindr AI</title>
<style>
:root {
  --primary: #FF8C00;
  --bg1: #FFF5D6;
  --bg2: #F6D68A;
}

/* BODY */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(var(--bg1), var(--bg2));
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CHAT BOX */
.chat {
  width: 400px;
  height: 600px;
  background: white;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

/* HEADER */
.header {
  background: var(--primary);
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: bold;
}

.header button {
  background: white;
  color: var(--primary);
  border: none;
  padding: 6px 12px;
  border-radius: 10px;
  cursor: pointer;
}

/* MESSAGES */
.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  margin: 6px;
  padding: 10px;
  border-radius: 12px;
  max-width: 70%;
  white-space: pre-wrap;
}

.user {
  background: var(--primary);
  color: white;
  margin-left: auto;
}

.ai {
  background: #eee;
}

/* INPUT */
.input-area {
  display: flex;
  border-top: 1px solid #ddd;
}

.input-area input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

.input-area button {
  background: var(--primary);
  color: white;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="chat">
  <div class="header">
    <span>Pathfindr AI 🤖</span>
    <button onclick="goToExplore()">Explore Careers 🗺️</button>
  </div>
  <div id="messages" class="messages"></div>
  <div class="input-area">
    <input id="input" placeholder="Ask anything..." onkeypress="handleKey(event)">
    <button onclick="send()">Send</button>
  </div>
</div>
<script>
let chatHistory = [];
const messages = document.getElementById("messages");

// Welcome message
addMsg("Hey! I'm Pathfindr AI 🤖\nAsk me anything about your career or studies.", "ai");

// Add message
function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

// Send message
async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  // Construct context dynamically to get latest data
  const context = `
Marks: ${localStorage.getItem("userMarks") || "N/A"}
Scores: ${localStorage.getItem("scores") || "N/A"}
Stream: ${localStorage.getItem("topStream") || "N/A"}
Interests: ${localStorage.getItem("interests") || "N/A"}
`;

  addMsg(text, "user");
  input.value = "";
  chatHistory.push({
  role: "user",
  content: text
});

  const loading = document.createElement("div");
  loading.className = "msg ai";
  loading.innerText = "Thinking...";
  messages.appendChild(loading);

  try {
    const res = await fetch("http://127.0.0.1:3000/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
  message: text,
  context: context,
  history: chatHistory
})
    });

    const data = await res.json();
    messages.removeChild(loading);

    if (data.reply) {
      addMsg(data.reply, "ai");
      chatHistory.push({ role: "assistant", content: data.reply });
    } else {
      addMsg("⚠️ No response from AI. Try again.", "ai");
    }

  } catch (err) {
    messages.removeChild(loading);
    addMsg("❌ Backend is offline or taking too long. Please try again.", "ai");
  }
}

// Enter key support
function handleKey(e) {
  if (e.key === "Enter") send();
}

// Explore navigation
function goToExplore() {
  window.location.href = "explore.html";
}

</script>
</body>
</html>
