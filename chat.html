<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathfindr - Student AI Mentor</title>
<link rel="stylesheet" href="style.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --primary-orange: #FF8C00; /* Dark Orange */
        --light-orange: #FFB347; /* Yellowish Orange */
        --bg-cream: #FFF8F0;
        --white: #ffffff;
        --text-dark: #2D2D2D;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
        background-color: var(--bg-cream);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    /* Mode Selection Overlay */
    #mode-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 248, 240, 0.95);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        transition: opacity 0.5s ease, visibility 0.5s;
    }

    .overlay-content {
        text-align: center;
        animation: fadeInDown 0.8s ease-out;
    }

    .overlay-content h1 {
        color: var(--primary-orange);
        margin-bottom: 30px;
        font-size: 2rem;
        font-weight: 700;
    }

    .mode-options {
        display: flex;
        gap: 30px;
        perspective: 1000px;
    }

    .mode-card {
        background: var(--white);
        width: 200px;
        padding: 40px 20px;
        border-radius: 25px;
        box-shadow: 0 15px 35px rgba(255, 140, 0, 0.1);
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        border: 2px solid transparent;
    }

    .mode-card:hover {
        transform: translateY(-15px) rotateX(10deg);
        border-color: var(--primary-orange);
        box-shadow: 0 20px 45px rgba(255, 140, 0, 0.2);
    }

    .mode-icon {
        font-size: 3.5rem;
        background: #FFF0E0;
        width: 100px;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: transform 0.3s ease;
    }

    .mode-card:hover .mode-icon {
        transform: scale(1.1) rotate(5deg);
    }

    .mode-card h3 {
        color: var(--text-dark);
        font-size: 1.2rem;
        font-weight: 600;
    }

    .mode-card p {
        font-size: 0.85rem;
        color: #777;
        line-height: 1.4;
    }

    @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .chat-container {
        width: 100%;
        max-width: 500px;
        height: 85vh;
        background: var(--white);
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(255, 140, 0, 0.15);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid var(--light-orange);
        opacity: 0;
        transform: scale(0.95);
        transition: all 0.5s ease;
        visibility: hidden;
    }

    .chat-container.visible {
        opacity: 1;
        transform: scale(1);
        visibility: visible;
    }

    .chat-header {
        background: linear-gradient(135deg, var(--light-orange), var(--primary-orange));
        padding: 15px 20px;
        color: white;
        text-align: left;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .header-info h2 { font-size: 1.1rem; font-weight: 600; }
    .header-info p { font-size: 0.75rem; opacity: 0.9; }

    .btn-quiz-next {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.4);
        padding: 8px 16px;
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .btn-quiz-next:hover {
        background: white;
        color: var(--primary-orange);
        transform: translateY(-2px);
    }

    /* Messages Area */
    #chat-box {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
        background-image: radial-gradient(var(--light-orange) 0.5px, transparent 0.5px);
        background-size: 20px 20px;
        background-color: #fffdfa;
    }

    .message {
        max-width: 80%;
        padding: 12px 16px;
        border-radius: 15px;
        font-size: 0.95rem;
        line-height: 1.5;
    }

    .ai-message {
        align-self: flex-start;
        background: #f0f0f0;
        color: var(--text-dark);
        border-bottom-left-radius: 2px;
    }

    .user-message {
        align-self: flex-end;
        background: var(--primary-orange);
        color: white;
        border-bottom-right-radius: 2px;
    }

    /* Input Area */
    .input-area {
        padding: 15px;
        background: white;
        border-top: 1px solid #eee;
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .mic-btn {
        background: #f0f0f0;
        color: var(--primary-orange);
        border: none;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        transition: 0.3s;
    }

    .mic-btn:hover {
        background: #e0e0e0;
        transform: scale(1.1);
    }

    .mic-btn.active {
        display: flex;
    }

    input {
        flex: 1;
        padding: 12px;
        border: 1.5px solid #eee;
        border-radius: 10px;
        outline: none;
        transition: 0.3s;
    }

    input:focus { border-color: var(--primary-orange); }

    button {
        background: var(--primary-orange);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
    }

    button:hover { background: var(--light-orange); }
</style>
</head>
<body>

<div id="mode-overlay">
    <div class="overlay-content">
        <h1>How would you like to learn?</h1>
        <div class="mode-options">
            <div class="mode-card" onclick="selectMode('text')">
                <div class="mode-icon">💬</div>
                <h3>Text with AI</h3>
                <p>Chat naturally through messages and get instant help.</p>
            </div>
            <div class="mode-card" onclick="selectMode('talk')">
                <div class="mode-icon">🎙️</div>
                <h3>Talk with AI</h3>
                <p>Use your voice to interact and listen to explanations.</p>
            </div>
        </div>
    </div>
</div>

<div class="chat-container">
    <div class="chat-header">
        <div class="header-info">
            <h2>Academic AI Assistant</h2>
            <p>Formal • Polite • Insightful</p>
        </div>
        <a href="quiz.html" class="btn-quiz-next">
            Take Quiz 📝
        </a>
    </div>

    <div id="chat-box">
        <!-- Messages will be appended here by JS -->
    </div>

    <div class="input-area">
        <button id="mic-btn" class="mic-btn" onclick="toggleMic()">🎙️</button>
        <input type="text" id="userInput" placeholder="Type your academic query here..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('userInput');
    const modeOverlay = document.getElementById('mode-overlay');
    const chatContainer = document.querySelector('.chat-container');
    const micBtn = document.getElementById('mic-btn');

    let currentMode = 'text';

    function selectMode(mode) {
        currentMode = mode;
        
        // Hide overlay
        modeOverlay.style.opacity = '0';
        modeOverlay.style.visibility = 'hidden';
        
        // Show chat
        chatContainer.classList.add('visible');

        // Initial response based on mode
        if (mode === 'talk') {
            micBtn.classList.add('active');
            userInput.placeholder = "Say something to your AI mentor...";
            appendMessage("Voice mode activated. I'm listening. How can I help you today?", 'ai-message');
        } else {
            micBtn.classList.remove('active');
            userInput.placeholder = "Type your academic query here...";
            appendMessage("Text mode activated. How may I assist you with your studies?", 'ai-message');
        }
    }

    function toggleMic() {
        // Voice recognition simulation
        const btn = document.getElementById('mic-btn');
        btn.classList.toggle('active-mic');
        
        if (btn.classList.contains('active-mic')) {
            btn.style.background = '#FF8C00';
            btn.style.color = '#fff';
            btn.innerText = '🔴';
            userInput.placeholder = "Listening...";
        } else {
            btn.style.background = '#f0f0f0';
            btn.style.color = '#FF8C00';
            btn.innerText = '🎙️';
            userInput.placeholder = currentMode === 'talk' ? "Say something..." : "Type something...";
        }
    }

    function handleKey(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // User Message
        appendMessage(text, 'user-message');
        userInput.value = '';

        // AI Response (Formal/Polite Simulation)
        setTimeout(() => {
            const aiResponse = "I have received your query. Please allow me a moment to provide a detailed and formal explanation regarding this topic.";
            appendMessage(aiResponse, 'ai-message');
        }, 800);
    }

    function appendMessage(text, className) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
